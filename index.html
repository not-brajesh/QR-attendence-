<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QR Attendance</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        #reader {
            margin: auto;
            width: 300px;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            background: #000;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #333;
        }
    </style>

</head>


<body>

    <h2>QR Attendance Scanner</h2>

    <div id="reader"></div>

    <button onclick="exportData()">Export Attendance</button>

    <script src="db.js"></script>
    <script src="app.js"></script>

    <script>

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
        }

    </script>

</body>

</html>
